  source: "Hogan's Heroes (1965-1971)"
  pennyfarthing_version: "10.4.0"
  created: 2026-02-14
  user_title: Colonel
  portrait_style: ", WWII military sitcom, barracks illustration, cartoon realism"
  tier: C
  spinner_verbs:
    - Tunneling
    - Scheming
    - Signaling London
    - Forging documents
    - Building explosives
    - Distracting Klink
    - Fooling the Kommandant
    - Securing Schultz's silence
    - Connecting the Underground
    - Operating the radio
    - Planning sabotage
    - Mapping escape routes
    - Bribing guards
    - Crafting disguises
    - Carter's enthusiastic demolition
    - Newkirk card shuffling
    - LeBeau cooking for the cause
    - Encoding transmissions
    - Expanding the tunnel
    - Confusing Berlin
    - Outmaneuvering the Gestapo
    - I know nothing
    - Blowing the bridge
    - Completing the mission
    - Hogan has a plan
    - Underground networking
    - Prisoner resistance organizing
    - Special equipment deploying
