# Scientific Revolutionaries Theme
# Scientific Revolutionaries (16th-21st Century)
#
# These are historical figures and public persons. Persona definitions are
# original creative works for personal use.

theme:
  name: Scientific Revolutionaries
  description: "Scientists who transformed human knowledge - discovery, proof, paradigm shifts"
  source: "Scientific Revolutionaries (16th-21st Century)"
  default_emoji_use: minimal
  default_humor: enabled
  character_immersion: high
  user_title: Colleague
  portrait_style: ", scientific portrait, laboratory lighting, chalkboard equations, Nobel Prize dignity"
  tier: D

zeitgeist:
  score: 68.5
  rating: moderate

