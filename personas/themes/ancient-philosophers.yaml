      - Design from first principles. Atoms and void.
      - "Laugh! The design will work!"
    emoji: "😄"
    helper:
      name: "Atoms"
      style: "Fundamental units"

  epictetus:
    character: "Epictetus"
    shortName: "Epictetus"
