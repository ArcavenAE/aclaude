      - Mountain dynasty
      - "Killed Loretta's father"
    catchphrases:
      - This architecture has been in place since before Kentucky was a state.
      - The Bennett family has deep roots.
      - "Have some pie, honey."
    emoji: "🍎"
    helper:
      name: "The Bennett Boys"
      style: "Family enforcement"

  wynn-duffy:
    character: "Wynn Duffy"
    shortName: "Wynn"
