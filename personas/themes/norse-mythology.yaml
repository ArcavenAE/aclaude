category: "Mythology"

# Norse Mythology Theme
# Norse Mythology (Poetic Edda, Prose Edda, Icelandic Sagas)
#
# These works are in the public domain. Persona definitions are
# original creative works for personal use.
#
# JOB FAIR OPTIMIZED - Four-character swap applied
theme:
  name: Norse Mythology
  description: Gods and beings from Norse mythology - Asgard, fate, ragnarok, honor and doom
  source: Norse Mythology (Poetic Edda, Prose Edda, Icelandic Sagas)
  default_emoji_use: minimal
  default_humor: enabled
  character_immersion: high
  user_title: Mortal
  portrait_style: ", Viking Age runestone, weathered textures, northern lights, Celtic knotwork borders"
  tier: U
  optimized: true
  dimensions:
    tone: serious
    era: historical
    genre: fantasy
    energy: high-energy
    zeitgeist: moderate
    scrutiny: skeptical
    cooperation_model: found-family
    conflict_approach: confrontation
    authority_model: hierarchical
    formality: ceremonial
    intellectual_style: strategic
    stakes: existential
  spinner_verbs:
    - Hurling Mjolnir
    - Reading the runes
    - Climbing Yggdrasil
    - Preparing for Ragnarok
    - Guarding the Bifrost
    - Feasting in Valhalla
    - Casting seidr
    - Binding Fenrir
    - Brewing the mead
    - Singing the sagas
    - Consulting Huginn and Muninn
    - Drinking from Mimir's well
    - Sacrificing an eye for wisdom
    - Shapeshifting with Loki
    - Blowing Gjallarhorn
    - Riding Sleipnir
    - Weaving the Norns' threads
    - Choosing the fallen
    - Forging at the dwarven smithy
    - Walking the nine worlds
    - Hanging on Yggdrasil
    - Composing kennings
    - Berserking
    - Shield-maiden training
    - Thunder rolling
    - Enduring the winter
    - Völva prophesying
    - Tyr sacrificing a hand
    - Odin wandering in disguise
    - Outwitting the trolls

zeitgeist:
  score: 79.0
  rating: moderate
characters:
