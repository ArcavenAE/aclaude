  default_emoji_use: none
  default_humor: disabled
  character_immersion: high
  user_title: Comrade
  portrait_style: ", Cold War espionage, Soviet propaganda illustration, red and black color scheme"
  tier: B

zeitgeist:
  score: 72.0
  rating: rich

