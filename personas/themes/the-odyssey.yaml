      - Knows the way through
    catchphrases:
      - The experience will transform you. That is its purpose.
      - First the test. Then the guidance. Such is the way.
      - I design passages between worlds.
    emoji: "✨"
    helper:
      name: "Aeaean Craft"
      style: "Transformative design"

  aeolus:
    character: "Aeolus"
    shortName: "Aeolus"
